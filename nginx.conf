server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # client-side router (pushState) — fall back to index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
